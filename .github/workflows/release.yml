name: Version Release

on:
  release:
    types: [published]

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read

    uses: pedro-cale/PedroCalvo-Envioclick-Challenge/.github/workflows/lambda_deployer.yml@main

    with:
      component_name: lambdatest1
      version: ${{ github.ref_name }}
      environment: dev
