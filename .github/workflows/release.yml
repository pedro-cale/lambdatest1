name: Version Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      version:
        description: "Version to deploy and release"
        required: true
        type: string

jobs:
  deploy:
    uses: pedro-cale/PedroCalvo-Envioclick-Challenge/.github/workflows/lambda_deployer.yml@main

    with:
      component_name: lambdatest1
      version: ${{ inputs.version }}
      environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: write

  create-release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        run: gh release create ${{ inputs.version }} --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
